################
### MONITORS ###
################

monitor= , preferred, auto, 2
monitor= eDP-1, highres, auto, 2

###################
### MY PROGRAMS ###
###################

$terminal = kitty
$fileManager = thunar
$menu = pgrep wofi >/dev/null 2>&1 && killall wofi || wofi --show drun
$browser = floorp

#################
### AUTOSTART ###
#################

exec-once = waybar & hyprpaper & solaar -w hide
exec-once = nwg-dock-hyprland -d -i 32 -nolauncher -w 0
exec-once = wvkbd-mobintl --hidden -L 250 -R 2 -fn "Jetbrains Mono 16"
exec-once = hyprpm reload && hyprpm update
exec-once = watch_tablet

exec-once = [workspace 2 silent] $browser
exec-once = [workspace 3 silent] vesktop
exec-once = [workspace 4 silent] steam

exec-once = systemd-inhibit --who="Hyprland config" --why="wlogout keybind" --what=handle-power-key --mode=block sleep infinity & echo $! > /tmp/.hyprland-systemd-inhibit
exec-shutdown = kill -9 "$(cat /tmp/.hyprland-systemd-inhibit)

#############################
### ENVIRONMENT VARIABLES ###
#############################

env = XCURSOR_SIZE, 24
env = HYPRCURSOR_SIZE, 24
env = GDK_SCALE, 2
env = QT_SCALE_FACTOR, 2

###################
### PERMISSIONS ###
###################



#####################
### LOOK AND FEEL ###
#####################

general {
    gaps_in = 2
    gaps_out = 4

    border_size = 2

    col.active_border = rgb(4c566a)
    col.inactive_border = rgb(3b4252)

    resize_on_border = true

    allow_tearing = false

    layout = dwindle
}

decoration {
    	rounding = 3
    	rounding_power = 2

	active_opacity = 0.8
	inactive_opacity = 0.75
	fullscreen_opacity = 1.0

	shadow {
    		enabled = true
    		range = 5
    		render_power = 4
    		color = rgba(12121fee)
	}

  	blur {
    		enabled = true
    		size = 3
		passes = 1
  	}
}

animations {
    enabled = yes, please :)

    bezier = easeOutQuint,0.23,1,0.32,1
    bezier = easeInOutCubic,0.65,0.05,0.36,1
    bezier = linear,0,0,1,1
    bezier = almostLinear,0.5,0.5,0.75,1.0
    bezier = quick,0.15,0,0.1,1

    animation = global, 1, 10, default
    animation = border, 1, 5.39, easeOutQuint
    animation = windows, 1, 4.79, easeOutQuint
    animation = windowsIn, 1, 4.1, easeOutQuint, popin 87%
    animation = windowsOut, 1, 1.49, linear, popin 87%
    animation = fadeIn, 1, 1.73, almostLinear
    animation = fadeOut, 1, 1.46, almostLinear
    animation = fade, 1, 3.03, quick
    animation = layers, 1, 3.81, easeOutQuint
    animation = layersIn, 1, 4, easeOutQuint, fade
    animation = layersOut, 1, 1.5, linear, fade
    animation = fadeLayersIn, 1, 1.79, almostLinear
    animation = fadeLayersOut, 1, 1.39, almostLinear
    animation = workspaces, 1, 1.94, almostLinear, slidefade
    animation = workspacesIn, 1, 1.21, almostLinear, slide
    animation = workspacesOut, 1, 1.94, almostLinear, slide
}

dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
}


#############
### INPUT ###
#############

input {
    kb_layout = de
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    sensitivity = 0.0

    touchpad {
        natural_scroll = true
	scroll_factor = 0.4
    }
}

gestures {
    workspace_swipe_cancel_ratio = 0.15
    gesture = 3, horizontal, workspace
}

device {
	name = elan06fa:00-04f3:327e-touchpad
	sensitivity = -0.1
}

device {
  name = wacom-hid-53b7-finger
  output = eDP-1
}

plugin {
	touch_gestures {
		sensitivity = 4.0
		workspace_swipe_fingers = 3
		workspace_swipe_edge = 0
		long_press_delay = 400
		edge_margin = 10
		emulate_touchpad_swipe = false


		hyprgrass-bind = , edge:r:l, workspace, +1
		hyprgrass-bind = , edge:l:r, workspace, -1
		hyprgrass-bind = , edge:r:u, brightnessctl -n4 -e2 10%+
		hyprgrass-bind = , edge:r:d, brightnessctl -n4 -e2 10%-

		hyprgrass-bind = , edge:u:d, exec, $menu

		hyprgrass-bind = , swipe:3:d, exec, sh $HOME/.config/scripts/toggleKbd.sh
		hyprgrass-bind = , swipe:4:d, killactive
		hyprgrass-bindm = , longpress:2, movewindow
	}
}

xwayland {
  force_zero_scaling = true
}


###################
### KEYBINDINGS ###
###################

$mainMod = SUPER

bind = $mainMod, Return, exec, $terminal
bind = $mainMod, Q, killactive,
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, togglefloating,
bind = $mainMod, 65, exec, $menu
bind = $mainMod, P, pseudo,
bind = $mainMod, J, togglesplit,
bind = $mainMod, F, fullscreen,
bind = $mainMod, L, exec, wlogout
bind = $mainMod, R, exec, hyprshot -m region -f -o /home/javi/Pictures/Screenshots/
bind = $mainMod SHIFT, R, exec, hyprshot -m window -o /home/javi/Pictures/Screenshots/

bind = $mainMod, B, exec, $browser

bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

bind = , XF86PowerOff, exec, wlogout

##############################
### WINDOWS AND WORKSPACES ###
##############################

windowrule = suppressevent maximize, class:.*
windowrule = nofocus,class:^$,title:^$,xwayland:1,floating:1,fullscreen:0,pinned:0

windowrule = opacity 1.0 0.75 1.0, class:floorp
windowrule = opaque, class:vesktop
windowrule = opaque, class:steam
windowrule = opaque, class:qcad-bin
windowrule = opaque, class:M32-Edit
windowrule = opaque, class:(jetbrains-)(.*)
windowrule = opaque, class:xournalpp
windowrule = opaque, class:winboat
windowrule = opaque, class:krita

windowrulev2=noinitialfocus, class:(jetbrains-)(.*), floating:1

layerrule = blur, gtk4-layer-shell
layerrule = ignorezero, gtk4-layer-shell
layerrule = blur, swaync-control-center
layerrule = blur, swaync-notification-window
layerrule = ignorealpha 0.5, swaync-control-center
layerrule = ignorealpha 0.5, swaync-notification-window
